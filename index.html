<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>b0p — send a bop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<style>
  /* ─── Design tokens ─────────────────────────────────────────────────────── */
  :root {
    --bg:           #0F0E09;
    --bg-card:      #1B1912;
    --bg-input:     #242218;
    --accent:       #F0C040;
    --accent-hover: #D9AB30;
    --text:         #EDE8DC;
    --text-muted:   #6E6A57;
    --border:       #2E2B1E;
    --radius:       12px;
    --radius-sm:    8px;
    --font-display: 'Space Mono', monospace;
    --font-body:    'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 22px 80px;
  }

  /* ─── Logo ──────────────────────────────────────────────────────────────── */
  .logo {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--accent);
    padding-top: 36px;
    display: block;
    text-decoration: none;
    user-select: none;
  }
  .logo .zero { color: var(--text); }
  .rec-headline .zero { color: var(--text); }

  .tagline {
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 400;
    margin-top: 4px;
    margin-bottom: 36px;
    letter-spacing: 0.02em;
  }

  /* ─── Label ─────────────────────────────────────────────────────────────── */
  .label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  /* ─── Input row ─────────────────────────────────────────────────────────── */
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }

  input[type="url"],
  textarea {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    padding: 12px 14px;
  }

  input[type="url"]:focus,
  textarea:focus {
    border-color: var(--accent);
  }

  input[type="url"]::placeholder,
  textarea::placeholder {
    color: var(--text-muted);
  }

  textarea {
    resize: none;
    height: 90px;
    line-height: 1.5;
  }

  /* ─── Buttons ───────────────────────────────────────────────────────────── */
  .btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #0F0E09;
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 12px 18px;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .btn:hover  { background: var(--accent-hover); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .btn-copy {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #0F0E09;
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 16px;
    width: 100%;
    margin-top: 20px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-copy:hover   { background: var(--accent-hover); }
  .btn-copy:active  { transform: scale(0.98); }
  .btn-copy.copied  { background: #4CAF50; color: #fff; }

  /* ─── Loading / error ───────────────────────────────────────────────────── */
  .loading {
    display: none;
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 4px;
  }
  .loading.on { display: block; }

  .error-msg {
    display: none;
    color: #E05555;
    font-size: 13px;
    margin-top: 6px;
    line-height: 1.5;
  }
  .error-msg.on { display: block; }

  /* ─── Preview card ───────────────────────────────────────────────────────── */
  .preview-card {
    display: none;
    margin-top: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .preview-card.on { display: block; }

  .preview-thumb {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }

  .preview-info {
    padding: 16px;
  }

  .preview-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
    color: var(--text);
  }

  .preview-artist {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 4px;
  }

  /* ─── Note area ─────────────────────────────────────────────────────────── */
  .note-wrap {
    margin-top: 16px;
  }

  .char-count {
    display: block;
    text-align: right;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .char-count.warn { color: #E05555; }

  /* ══════════════════════════════════════════════════════════════════════════
     RECEIVER VIEW
  ══════════════════════════════════════════════════════════════════════════ */
  #receiver-view { display: none; }
  #receiver-view.on { display: block; }
  #sender-view.hide  { display: none; }

  .rec-eyebrow {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-top: 72px;
  }

  .rec-headline {
    font-family: var(--font-display);
    font-size: 42px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -1px;
    margin-bottom: 24px;
  }

  /* YouTube embed */
  .yt-frame {
    display: none;
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
    border-radius: var(--radius);
    margin-bottom: 20px;
  }
  .yt-frame.on { display: block; }

  /* Thumbnail fallback */
  .rec-thumb {
    display: none;
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: var(--radius);
    margin-bottom: 20px;
  }
  .rec-thumb.on { display: block; }

  .rec-song-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
    color: var(--text);
  }

  .rec-song-artist {
    color: var(--text-muted);
    font-size: 15px;
    margin-top: 4px;
    margin-bottom: 20px;
  }

  .rec-note {
    display: none;
    font-size: 15px;
    font-style: italic;
    color: var(--text);
    background: var(--bg-card);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 16px;
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .rec-note.on { display: block; }

  /* Platform grid */
  .platform-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
    margin-bottom: 36px;
  }

  .p-btn {
    display: block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    padding: 13px 14px;
    text-align: center;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
  }
  .p-btn:hover {
    background: var(--bg-input);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Footer CTA */
  .footer-cta {
    border-top: 1px solid var(--border);
    padding-top: 24px;
    text-align: center;
  }
  .footer-cta p {
    color: var(--text-muted);
    font-size: 13px;
  }
  .footer-cta a {
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
    text-decoration: none;
  }
  .footer-cta a:hover { text-decoration: underline; }

  /* Match verification */
  .warning-msg {
    display: none;
    background: rgba(240,192,64,0.08);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 10px 14px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .warning-msg.on { display: block; }
  .match-verify {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .match-verify.on { display: block; }
  .match-verify .label { margin-bottom: 6px; }
  .match-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-bottom: 8px;
    transition: opacity 0.2s;
  }
  .match-item.removed {
    opacity: 0.3;
    text-decoration: line-through;
  }
  .match-item-info { flex: 1; min-width: 0; }
  .match-item-platform {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .match-item-song {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .match-item-artist {
    font-size: 11px;
    color: var(--text-muted);
  }
  .match-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 11px;
    padding: 5px 10px;
    margin-left: 10px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .match-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .match-toggle.removed { color: var(--accent); border-color: var(--accent); }
  .isrc-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #4CAF50;
    background: rgba(76,175,80,0.12);
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .version-tag {
    position: fixed;
    bottom: 6px;
    right: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: rgba(110,106,87,0.4);
    letter-spacing: 0.04em;
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     SENDER VIEW
═══════════════════════════════════════ -->
<div id="sender-view">
  <a class="logo" href="/">b<span class="zero">0</span>p</a>
  <p class="tagline">share a song that actually opens for your friend</p>

  <p class="label">paste a music link</p>
  <div class="input-row">
    <input type="url" id="song-url" placeholder="Spotify, Apple Music, YouTube, SoundCloud, Bandcamp…" autocomplete="off" spellcheck="false">
    <button class="btn" id="find-btn">FIND</button>
  </div>
  <div class="loading" id="loading">looking it up…</div>
  <div class="error-msg" id="error-msg"></div>

  <!-- Preview card (shown after lookup) -->
  <div class="preview-card" id="preview-card">
    <img class="preview-thumb" id="preview-thumb" src="" alt="">
    <div class="preview-info">
      <div class="preview-title"  id="preview-title">—</div>
      <div class="preview-artist" id="preview-artist">—</div>

      <div class="note-wrap">
        <p class="label" style="margin-top:16px;">add a note (optional)</p>
        <textarea id="note-input"
          placeholder="the guitar at 2:14 is unreal…"
          maxlength="500"></textarea>
        <span class="char-count" id="char-count">0 / 500</span>
      </div>
    </div>

    <!-- Match verification (shown when search-based matches need confirmation) -->
    <div class="warning-msg" id="warning-msg"></div>
    <div class="match-verify" id="match-verify">
      <div style="padding: 0 16px;">
        <p class="label">we found this song on other platforms — look right?</p>
        <div id="match-list"></div>
      </div>
    </div>

    <div style="padding:0 16px 16px;">
      <button class="btn-copy" id="copy-btn">COPY YOUR BOP LINK</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     RECEIVER VIEW
═══════════════════════════════════════ -->
<div id="receiver-view">
  <p class="rec-eyebrow">someone sent you a</p>
  <div class="rec-headline">b<span class="zero">0</span>p 🎵</div>

  <iframe class="yt-frame" id="yt-frame"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen></iframe>

  <img class="rec-thumb" id="rec-thumb" src="" alt="">

  <div class="rec-song-title"  id="rec-song-title">—</div>
  <div class="rec-song-artist" id="rec-song-artist">—</div>

  <div class="rec-note" id="rec-note"></div>

  <p class="label">open in your app</p>
  <div class="platform-grid" id="platform-grid"></div>

  <div class="footer-cta">
    <p>got a bop to share?</p>
    <a id="send-own-link" href="/">send your own →</a>
  </div>
</div>

<script>
// =============================================================================
// b0p.app — share a bop
// Changelog:
//   v20260401-01 — initial build: sender + receiver views, odesli API,
//                  LZString URL hash, YouTube embed, platform buttons,
//                  500-char note, clipboard copy, network error detection
//   v20260403-01 — clean rebuild: fixes preview UI layout, char counter warn,
//                  improved platform label map, cleaner YouTube ID extraction,
//                  logo links to sender view
//   v20260403-02 — fix: route odesli fetch through corsproxy.io to resolve
//                  CORS block on GitHub Pages and other static hosting
//   v20260407-01 — swap corsproxy.io for own Cloudflare Worker proxy at
//                  b0p-api.theseidel.workers.dev (origin-whitelisted, cached)
//   v20260407-02 — fix: receiver view not rendering (display fallback bug)
//   v20260407-03 — fix: amazonMusic platform key (was 'amazon'), add amazonStore,
//                  add debug console.log for odesli response, add version footer
//   v20260407-04 — fix: remove doubled b0p logo/headline on receiver view,
//                  add ?test=receiver mode for QA without API calls
//   v20260408-01 — MAJOR: replace odesli with self-hosted resolver (Spotify API
//                  + iTunes API + YouTube/SoundCloud/Bandcamp oEmbed + Deezer API).
//                  Accepts 7 input platforms, resolves to 10 output platforms.
//                  Space Mono branding. Added: SoundCloud, Bandcamp, Pandora buttons.
//   v20260408-02 — fix: hide broken image when no thumbnail available
//   v20260408-03 — fix: platform buttons render in priority order (Spotify/Apple first)
//   v20260409-01 — MAJOR: sender confirmation flow for search-based matches.
//                  Source metadata (title/artist/thumbnail) never overwritten.
//                  SoundCloud + Bandcamp page scraping. ISRC matches auto-confirmed.
//                  matchInfo from worker tells frontend which links need review.
// =============================================================================

const PLATFORMS = {
  spotify:        'Spotify',
  appleMusic:     'Apple Music',
  youtube:        'YouTube',
  youtubeMusic:   'YouTube Music',
  tidal:          'Tidal',
  deezer:         'Deezer',
  amazonMusic:    'Amazon Music',
  soundcloud:     'SoundCloud',
  bandcamp:       'Bandcamp',
  pandora:        'Pandora',
};

// ─── Routing ─────────────────────────────────────────────────────────────────

function getHashPayload() {
  const h = window.location.hash;
  if (!h.startsWith('#b/')) return null;
  try {
    const raw = LZString.decompressFromEncodedURIComponent(h.slice(3));
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function buildHash(songObj) {
  const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(songObj));
  return `#b/${compressed}`;
}

// ─── Init ─────────────────────────────────────────────────────────────────────

// Test mode: add ?test=receiver to URL to preview receiver with mock data
const TEST_PAYLOAD = {
  t: "Love Vibration",
  a: 'Ron the Ron',
  img: 'https://f4.bcbits.com/img/a0339810137_16.jpg',
  yt: null,
  n: 'this track is pure vibes',
  p: {
    spotify:      'https://open.spotify.com/track/EXAMPLE',
    appleMusic:   'https://music.apple.com/us/album/love-vibration/EXAMPLE',
    youtube:      'https://www.youtube.com/results?search_query=Ron+the+Ron+Love+Vibration',
    youtubeMusic: 'https://music.youtube.com/search?q=Ron+the+Ron+Love+Vibration',
    tidal:        'https://tidal.com/search?q=Ron+the+Ron+Love+Vibration',
    amazonMusic:  'https://music.amazon.com/search/Ron+the+Ron+Love+Vibration',
    deezer:       'https://www.deezer.com/search/Ron+the+Ron+Love+Vibration',
    soundcloud:   'https://soundcloud.com/search/sounds?q=Ron+the+Ron+Love+Vibration',
    bandcamp:     'https://rontheronmusic.bandcamp.com/track/love-vibration',
    pandora:      'https://www.pandora.com/search/Ron+the+Ron+Love+Vibration/tracks',
  }
};

const isTestMode = new URLSearchParams(window.location.search).get('test') === 'receiver';
const payload = isTestMode ? TEST_PAYLOAD : getHashPayload();

if (payload) {
  renderReceiver(payload);
} else {
  initSender();
}

// ─── Sender ───────────────────────────────────────────────────────────────────

function initSender() {
  document.getElementById('sender-view').style.display = '';
  document.getElementById('receiver-view').style.display = 'none';

  let songData = null;
  let removedPlatforms = new Set();

  const $url       = document.getElementById('song-url');
  const $findBtn   = document.getElementById('find-btn');
  const $loading   = document.getElementById('loading');
  const $error     = document.getElementById('error-msg');
  const $preview   = document.getElementById('preview-card');
  const $copyBtn   = document.getElementById('copy-btn');
  const $note      = document.getElementById('note-input');
  const $charCount = document.getElementById('char-count');
  const $matchVerify = document.getElementById('match-verify');
  const $matchList   = document.getElementById('match-list');

  $findBtn.addEventListener('click', lookupSong);
  $url.addEventListener('keydown', e => { if (e.key === 'Enter') lookupSong(); });

  $note.addEventListener('input', () => {
    const len = $note.value.length;
    $charCount.textContent = `${len} / 500`;
    $charCount.classList.toggle('warn', len > 450);
  });

  $copyBtn.addEventListener('click', () => {
    if (!songData) return;
    // Build platforms excluding removed ones
    const filteredPlatforms = {};
    Object.entries(songData.p).forEach(([key, url]) => {
      if (!removedPlatforms.has(key)) filteredPlatforms[key] = url;
    });
    const obj = { t: songData.t, a: songData.a, img: songData.img, yt: songData.yt, p: filteredPlatforms };
    if ($note.value.trim()) obj.n = $note.value.trim().slice(0, 500);
    const url = window.location.origin + window.location.pathname + buildHash(obj);
    navigator.clipboard.writeText(url).then(() => {
      $copyBtn.textContent = '✓ COPIED!';
      $copyBtn.classList.add('copied');
      setTimeout(() => {
        $copyBtn.textContent = 'COPY YOUR BOP LINK';
        $copyBtn.classList.remove('copied');
      }, 2500);
    }).catch(() => {
      prompt('Copy this link:', url);
    });
  });

  async function lookupSong() {
    const rawUrl = $url.value.trim();
    if (!rawUrl) { setError('Paste a music link first.'); return; }

    setError('');
    setLoading(true);
    $preview.classList.remove('on');
    $matchVerify.classList.remove('on');
    $matchList.innerHTML = '';
    document.getElementById('warning-msg').classList.remove('on');
    songData = null;
    removedPlatforms = new Set();

    try {
      const res = await fetch(`https://b0p-api.theseidel.workers.dev?url=${encodeURIComponent(rawUrl)}`);
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `API error ${res.status}. Try a different link.`);
      }
      const data = await res.json();
      console.log('b0p API response:', data);

      // API-level error (unrecognized URL, failed resolution)
      if (data.error) {
        throw new Error(data.error);
      }

      const title     = data.title    || '(unknown title)';
      const artist    = data.artist   || '(unknown artist)';
      const thumb     = data.thumbnail || '';
      const platforms = data.platforms || {};
      const matchInfo = data.matchInfo || {};
      const apiWarnings = data.warnings || [];
      const ytId      = data.youtubeId || extractYouTubeId(platforms.youtube || '');

      songData = { t: title, a: artist, img: thumb, yt: ytId, p: platforms };

      // Show preview with SOURCE metadata (never overwritten by search results)
      const $thumb = document.getElementById('preview-thumb');
      if (thumb) { $thumb.src = thumb; $thumb.style.display = ''; }
      else { $thumb.style.display = 'none'; }
      document.getElementById('preview-title').textContent  = title;
      document.getElementById('preview-artist').textContent = artist;

      // Show warnings if any
      const $warning = document.getElementById('warning-msg');
      if (apiWarnings.length > 0) {
        $warning.textContent = apiWarnings.join(' ');
        $warning.classList.add('on');
      } else {
        $warning.classList.remove('on');
      }

      // Show match verification for search-based cross-platform links
      const searchMatches = [];
      Object.entries(matchInfo).forEach(([platform, info]) => {
        if (info.method === 'search' && info.foundTitle && PLATFORMS[platform]) {
          searchMatches.push({ platform, ...info });
        }
      });

      if (searchMatches.length > 0) {
        searchMatches.forEach(match => {
          const $item = document.createElement('div');
          $item.className = 'match-item';
          $item.dataset.platform = match.platform;

          const $info = document.createElement('div');
          $info.className = 'match-item-info';
          $info.innerHTML = `
            <div class="match-item-platform">${PLATFORMS[match.platform]}</div>
            <div class="match-item-song">${match.foundTitle}</div>
            <div class="match-item-artist">${match.foundArtist}</div>
          `;

          const $btn = document.createElement('button');
          $btn.className = 'match-toggle';
          $btn.textContent = 'Remove';
          $btn.addEventListener('click', () => {
            const isRemoved = $item.classList.toggle('removed');
            $btn.classList.toggle('removed', isRemoved);
            $btn.textContent = isRemoved ? 'Undo' : 'Remove';
            if (isRemoved) removedPlatforms.add(match.platform);
            else removedPlatforms.delete(match.platform);
          });

          $item.appendChild($info);
          $item.appendChild($btn);
          $matchList.appendChild($item);
        });

        // Also show ISRC-confirmed matches (no remove button)
        Object.entries(matchInfo).forEach(([platform, info]) => {
          if (info.method === 'isrc' && info.foundTitle && PLATFORMS[platform]) {
            const $item = document.createElement('div');
            $item.className = 'match-item';
            $item.innerHTML = `
              <div class="match-item-info">
                <div class="match-item-platform">${PLATFORMS[platform]} <span class="isrc-badge">ISRC ✓</span></div>
                <div class="match-item-song">${info.foundTitle}</div>
                <div class="match-item-artist">${info.foundArtist}</div>
              </div>
            `;
            $matchList.appendChild($item);
          }
        });

        $matchVerify.classList.add('on');
      }

      $preview.classList.add('on');

    } catch (e) {
      const isNetwork = e instanceof TypeError;
      setError(isNetwork
        ? 'Network error. If you\'re opening this file directly (file://), run it via a local server: python3 -m http.server 8080'
        : (e.message || 'Something went wrong. Try again.'));
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    $loading.classList.toggle('on', on);
    $findBtn.disabled = on;
  }

  function setError(msg) {
    $error.textContent = msg;
    $error.classList.toggle('on', !!msg);
  }
}

// ─── Receiver ─────────────────────────────────────────────────────────────────

function renderReceiver(song) {
  document.getElementById('sender-view').style.display  = 'none';
  document.getElementById('receiver-view').style.display = 'block';

  document.getElementById('rec-song-title').textContent  = song.t || '—';
  document.getElementById('rec-song-artist').textContent = song.a || '—';

  const $yt    = document.getElementById('yt-frame');
  const $thumb = document.getElementById('rec-thumb');

  if (song.yt) {
    $yt.src = `https://www.youtube.com/embed/${song.yt}`;
    $yt.classList.add('on');
  } else if (song.img) {
    $thumb.src = song.img;
    $thumb.classList.add('on');
  }

  if (song.n) {
    const $note = document.getElementById('rec-note');
    $note.textContent = `"${song.n}"`;
    $note.classList.add('on');
  }

  const $grid = document.getElementById('platform-grid');
  // Render in PLATFORMS priority order (Spotify & Apple Music first)
  Object.keys(PLATFORMS).forEach(key => {
    const url = (song.p || {})[key];
    if (!url) return;
    const a = document.createElement('a');
    a.href      = url;
    a.target    = '_blank';
    a.rel       = 'noopener noreferrer';
    a.className = `p-btn p-${key}`;
    a.textContent = PLATFORMS[key];
    $grid.appendChild(a);
  });

  const base = window.location.origin + window.location.pathname;
  document.getElementById('send-own-link').href = base;
}

// ─── Utils ────────────────────────────────────────────────────────────────────

function extractYouTubeId(url) {
  if (!url) return null;
  try {
    const u = new URL(url);
    // Standard: youtube.com/watch?v=ID
    if (u.hostname.includes('youtube.com')) {
      return u.searchParams.get('v') || null;
    }
    // Short: youtu.be/ID
    if (u.hostname === 'youtu.be') {
      return u.pathname.slice(1) || null;
    }
  } catch {}
  return null;
}
